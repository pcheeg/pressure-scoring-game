<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <title>Darts Pressure</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <main class="app" id="app">
    <section class="card">
      <header class="top">
        <div>
          <p class="label">STATUS</p>
          <h1 id="statusText">SHIELD</h1>
        </div>
        <div class="mode-pill" id="modePill">NORMAL</div>
      </header>

      <div id="shieldWrap" class="shield-wrap">
        <div class="shield-row">
          <span>SHIELD</span>
          <strong id="shieldPercent">100%</strong>
        </div>
        <div class="shield-bar">
          <div id="shieldFill" class="shield-fill"></div>
        </div>
      </div>

      <div id="dangerWrap" class="danger-wrap hidden">
        <div class="danger-title">NO ROOM FOR ERROR</div>
        <div class="danger-sub" id="shieldReturnText">SHIELD IN 3 VISITS</div>
      </div>

      <section class="required">
        <p class="label">REQUIRED</p>
        <div class="score" id="requiredScore">41+</div>
      </section>

      <section class="stats">
        <div>
          <p class="label">GROWTH</p>
          <strong id="growthText">+1</strong>
        </div>
        <div>
          <p class="label">RUN</p>
          <strong id="runText">0</strong>
        </div>
        <div>
          <p class="label">BEST</p>
          <strong id="bestText">0</strong>
        </div>
      </section>

      <section class="actions">
        <button id="hitBtn" class="primary">HIT</button>
        <button id="missBtn" class="danger">MISS</button>
        <button id="undoBtn" class="secondary">UNDO</button>
      </section>

      <section id="boostPanel" class="boost-panel">
        <button id="boostBtn" class="boost">BOOST</button>
        <p>Exchange shield for +2 growth. Commit until shield returns.</p>
      </section>

      <section id="choicePanel" class="choice-panel hidden">
        <p class="choice-title">Shield ready</p>
        <div class="choice-buttons">
          <button id="stabiliseBtn" class="secondary">STABILISE</button>
          <button id="continueBoostBtn" class="boost">BOOST+</button>
        </div>
      </section>
    </section>

    <section id="gameOver" class="overlay hidden">
      <div class="modal">
        <p class="label">GAME OVER</p>
        <h2 id="gameOverTitle">Run ended</h2>
        <p id="gameOverStats"></p>
        <button id="restartBtn" class="primary full">START AGAIN</button>
      </div>
    </section>

    <section id="winScreen" class="overlay hidden">
      <div class="modal">
        <p class="label">COMPLETE</p>
        <h2>You reached 180.</h2>
        <p>Perfect pressure run.</p>
        <button id="winRestartBtn" class="primary full">START AGAIN</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
